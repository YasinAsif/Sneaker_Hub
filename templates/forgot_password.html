{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="bi bi-key-fill text-accent"></i> Reset Password</h2>
        <p class="auth-subtitle">Enter your email and new password</p>
        <form method="POST" id="form-forgot-password">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="input-email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="input-email" name="email"
                       value="{{ email|default('') }}" required>
            </div>
            <div class="mb-3">
                <label for="input-new-password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="input-new-password" name="new_password" minlength="8" required>
            </div>
            <div class="mb-4">
                <label for="input-confirm-password" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="input-confirm-password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3" id="btn-reset-password">
                <i class="bi bi-arrow-repeat"></i> Reset Password
            </button>
        </form>
        <p class="text-center text-muted mb-0"><a href="{{ url_for('auth.login') }}" id="link-back-login"><i class="bi bi-arrow-left"></i> Back to Login</a></p>
    </div>
</div>
{% endblock %}
