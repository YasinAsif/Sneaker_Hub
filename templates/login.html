{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="bi bi-lightning-charge-fill text-accent"></i> Welcome Back</h2>
        <p class="auth-subtitle">Sign in to your SneakerHub account</p>
        <form method="POST" id="form-login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label for="input-login-id" class="form-label">Username or Email</label>
                <input type="text" class="form-control" id="input-login-id" name="login_id"
                       value="{{ login_id|default('') }}" placeholder="Enter username or email" required>
            </div>
            <div class="mb-3">
                <label for="input-password" class="form-label">Password</label>
                <input type="password" class="form-control" id="input-password" name="password"
                       placeholder="Enter password" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="input-remember" name="remember">
                    <label class="form-check-label text-muted" for="input-remember">Remember me</label>
                </div>
                <a href="{{ url_for('auth.forgot_password') }}" class="small" id="link-forgot-password">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-accent w-100 py-2 mb-3" id="btn-submit-login">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>
        <p class="text-center text-muted mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}" id="link-to-register">Sign Up</a></p>
    </div>
</div>
{% endblock %}
